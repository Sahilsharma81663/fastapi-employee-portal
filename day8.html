<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-gray-800">Employee Management Portal</h1>
            <p class="text-gray-600 mt-2">Manage, filter, and track employee records in real-time.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-md h-fit">
                <h2 id="form-title" class="text-2xl font-semibold mb-4 text-gray-700">Add New Employee</h2>
                <form id="employee-form" class="space-y-4">
                    <input type="hidden" id="is-update" value="false">

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Employee ID</label>
                        <input type="number" id="emp_id" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" id="name" required minlength="4" maxlength="50"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500"
                            placeholder="Min 4 letters (No abc/xyz)">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Age</label>
                            <input type="number" id="age" required min="18" max="60"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Contact (10 digits)</label>
                            <input type="text" id="contact" required pattern="^[0-9]{10}$"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" id="email" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" id="password" required minlength="8"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Department</label>
                            <input type="text" id="department"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">City</label>
                            <input type="text" id="city"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <div class="flex space-x-2 pt-2">
                        <button type="submit" id="submit-btn"
                            class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">Save
                            Employee</button>
                        <button type="button" id="cancel-btn"
                            class="hidden w-1/3 bg-gray-400 text-white py-2 px-4 rounded-md hover:bg-gray-500 transition">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="lg:grid-cols-1 lg:col-span-2 space-y-6">

                <div class="bg-white p-4 rounded-lg shadow-md flex flex-wrap items-end gap-4">
                    <div class="flex-1 min-w-[150px]">
                        <label class="block text-sm font-medium text-gray-700">Filter Department</label>
                        <input type="text" id="search-dept"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border">
                    </div>
                    <div class="flex-1 min-w-[150px]">
                        <label class="block text-sm font-medium text-gray-700">Filter City</label>
                        <input type="text" id="search-city"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border">
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="fetchEmployees()"
                            class="bg-emerald-600 text-white py-2 px-4 rounded-md hover:bg-emerald-700 transition">Search</button>
                        <button onclick="clearSearch()"
                            class="bg-gray-500 text-white py-2 px-4 rounded-md hover:bg-gray-600 transition">Reset</button>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="p-4 bg-gray-800 text-white flex justify-between items-center">
                        <h3 class="text-xl font-semibold">Employee Database</h3>
                        <span id="emp-count" class="bg-blue-600 text-xs px-2.5 py-1 rounded-full font-bold">Total:
                            0</span>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name/Age
                                    </th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Contact
                                        Details</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Dept &
                                        City</th>
                                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody id="employee-table-body" class="bg-white divide-y divide-gray-200">
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Automatically targets the exact host/port where FastAPI is serving this file
        const API_URL = "http://127.0.0.1:8000";;

        document.getElementById('employee-form').addEventListener('submit', handleFormSubmit);
        document.getElementById('cancel-btn').addEventListener('click', resetForm);

        // Auto-fetch data when UI loads
        window.onload = () => {
            fetchEmployees();
        };

        // READ: Fetch all or search filtered employees
        async function fetchEmployees() {
            const dept = document.getElementById('search-dept').value;
            const city = document.getElementById('search-city').value;

            let url = `${API_URL}/employees`;

            if (dept || city) {
                url = `${API_URL}/search?`;
                if (dept) url += `department=${encodeURIComponent(dept)}&`;
                if (city) url += `city=${encodeURIComponent(city)}`;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();

                const list = data.employees || data.result || [];
                document.getElementById('emp-count').innerText = `Total: ${list.length}`;

                renderTable(list);
            } catch (err) {
                console.error(err);
                alert('Error connecting to the backend API.');
            }
        }

        // Generate Table Rows Dynamically
        function renderTable(employees) {
            const tbody = document.getElementById('employee-table-body');
            tbody.innerHTML = '';

            if (employees.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-500">No employees found.</td></tr>`;
                return;
            }

            employees.forEach(emp => {
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50 transition";

                // Escape simple string inputs safely to prevent HTML breakage inside the parameters
                const safeEmpString = JSON.stringify(emp).replace(/"/g, '&quot;');

                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap font-bold text-gray-700">${emp.emp_id}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-semibold text-gray-900">${emp.name}</div>
                        <div class="text-xs text-gray-500">Age: ${emp.age}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${emp.email}</div>
                        <div class="text-xs text-gray-500">📞 ${emp.contact}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">${emp.department || 'N/A'}</span>
                        <div class="text-xs text-gray-500 mt-1">📍 ${emp.city || 'N/A'}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium space-x-2">
                        <button onclick="setupUpdateForm(${safeEmpString})" class="text-indigo-600 hover:text-indigo-900 font-semibold">Edit</button>
                        <button onclick="deleteEmployee(${emp.emp_id})" class="text-red-600 hover:text-red-900 font-semibold">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // CREATE or UPDATE actions
        async function handleFormSubmit(e) {
            e.preventDefault();

            const nameVal = document.getElementById('name').value.toLowerCase().trim();
            if (nameVal === 'abc' || nameVal === 'xyz') {
                alert("Name cannot be 'abc' or 'xyz'!");
                return;
            }

            const isUpdate = document.getElementById('is-update').value === 'true';
            const emp_id = document.getElementById('emp_id').value;

            const payload = {
                emp_id: parseInt(emp_id),
                name: document.getElementById('name').value,
                age: parseInt(document.getElementById('age').value),
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                contact: document.getElementById('contact').value,
                department: document.getElementById('department').value || null,
                city: document.getElementById('city').value || null
            };

            const method = isUpdate ? 'PUT' : 'POST';
            const endpoint = isUpdate ? `${API_URL}/employees/${emp_id}` : `${API_URL}/employees`;

            try {
                const response = await fetch(endpoint, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.status === 200 || response.status === 201) {
                    alert(result.message);
                    resetForm();
                    fetchEmployees();
                } else {
                    alert(`Error: ${result.detail || JSON.stringify(result.body)}`);
                }
            } catch (error) {
                alert("Failed to submit request.");
            }
        }

        // DELETE handling
        async function deleteEmployee(emp_id) {
            if (!confirm(`Are you sure you want to delete employee ID ${emp_id}?`)) return;

            try {
                const response = await fetch(`${API_URL}/employees/${emp_id}`, { method: 'DELETE' });
                const result = await response.json();

                if (response.ok) {
                    alert(result.message);
                    fetchEmployees();
                } else {
                    alert(`Error: ${result.detail}`);
                }
            } catch (err) {
                alert("Could not process deletion.");
            }
        }

        // Populate fields to switch into Update Mode
        function setupUpdateForm(emp) {
            document.getElementById('form-title').innerText = "Update Employee Details";
            document.getElementById('is-update').value = "true";

            document.getElementById('emp_id').value = emp.emp_id;
            document.getElementById('emp_id').disabled = true; // Lock ID during update

            document.getElementById('name').value = emp.name;
            document.getElementById('age').value = emp.age;
            document.getElementById('email').value = emp.email;
            document.getElementById('password').value = emp.password || "";
            document.getElementById('contact').value = emp.contact;
            document.getElementById('department').value = emp.department || "";
            document.getElementById('city').value = emp.city || "";

            document.getElementById('submit-btn').innerText = "Update Records";
            document.getElementById('cancel-btn').classList.remove('hidden');
        }

        // Resets the inputs back to defaults
        function resetForm() {
            document.getElementById('form-title').innerText = "Add New Employee";
            document.getElementById('is-update').value = "false";
            document.getElementById('emp_id').disabled = false;
            document.getElementById('employee-form').reset();
            document.getElementById('submit-btn').innerText = "Save Employee";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        // Clear query fields
        function clearSearch() {
            document.getElementById('search-dept').value = '';
            document.getElementById('search-city').value = '';
            fetchEmployees();
        }
    </script>
</body>

</html>
